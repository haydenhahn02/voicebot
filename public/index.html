<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Console — talk to Claude</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="console">
    <header class="console__header">
      <span class="eyebrow">VOICEBOT · 01</span>
      <h1>Console</h1>
    </header>

    <section class="orb-stage">
      <button id="orb" class="orb" aria-label="Hold to talk, or click to start listening">
        <span class="orb__ring"></span>
        <span class="orb__ring orb__ring--2"></span>
        <span class="orb__core"></span>
      </button>
      <p id="state-label" class="state-label">idle</p>
    </section>

    <section class="transcript" id="transcript" aria-live="polite">
      <p class="transcript__hint">Click the orb and speak, or type below. Claude will answer out loud.</p>
    </section>

    <form class="input-row" id="input-form">
      <button type="button" id="mic-toggle" class="icon-btn" aria-label="Toggle microphone" title="Speak">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z"/>
          <path d="M19 11a7 7 0 0 1-14 0"/>
          <path d="M12 18v3"/>
        </svg>
      </button>
      <input
        type="text"
        id="text-input"
        placeholder="Type a message, or use the mic…"
        autocomplete="off"
      />
      <button type="submit" class="icon-btn icon-btn--send" aria-label="Send message" title="Send">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 12 20 4l-7 16-2-7-7-1Z"/>
        </svg>
      </button>
    </form>

    <p id="status-line" class="status-line">&nbsp;</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
